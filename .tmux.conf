set -as terminal-overrides ',st*:RGB'
set -g default-terminal "screen-256color"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/block/cyan' # 'jimeh/tmux-themepack'
run -b '~/.tmux/plugins/tpm/tpm'
# Tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'sainnhe/tmux-fzf'
#set -g @plugin 'dracula/tmux'

run '~/.tmux/plugins/tpm/tpm'

unbind C-b
set -g prefix C-a
#bind-key C-s last-window
bind-key C-a send-prefix

set -g base-index 1
set -g escape-time 20
set -g mode-keys vi
set -g history-limit 10000

# Kill a session with Capital X
bind-key X kill-session

set -g status-bg black
set -g status-fg white
set -g status-interval 60
set -g status-left-length 30
set -g status-right-length 20

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h previous-window
bind -n M-l next-window

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
bind r source-file ~/.tmux.conf

bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# fzf to change the sission
bind-key "C-l" run-shell -b "/home/rahul/.tmux/plugins/tmux-fzf/scripts/session.sh attach"
